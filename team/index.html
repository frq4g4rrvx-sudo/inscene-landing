<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team | inscene.io</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; overflow-x: hidden; }
      .pulsate-bg {
            background: radial-gradient(circle at center, #001a4d 0%, #000 70%);
            animation: pulse 8s infinite ease-in-out;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
      .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
    </style>
</head>
<body class="text-slate-200 font-sans selection:bg-blue-500/30 min-h-screen flex flex-col">

    <div class="pulsate-bg"></div>

    <nav class="max-w-6xl mx-auto px-6 py-8 w-full flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter text-white">inscene<span class="text-blue-500">.io</span></div>
        <a href="index.html" class="text-xs uppercase tracking-widest text-slate-500 font-semibold border border-slate-800 px-4 py-1 rounded-full hover:bg-slate-800 transition-all">
            Back to Home
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6">
        <div class="glass-panel max-w-lg w-full p-16 rounded-3xl text-center shadow-2xl">
            <div class="inline-block px-3 py-1 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-6">
                Orchestration Team
            </div>
            <h1 class="text-4xl font-black text-white tracking-tighter mb-4">. . .</h1>
            <p class="text-slate-400 text-lg font-medium italic">
                To be announced soon.
            </p>
            
        </div>
    </main>

    <footer class="py-12 px-6 text-center border-t border-slate-900">
        <p class="text-xs text-slate-600 uppercase tracking-widest font-semibold">© 2026 inscene.io | Powered by Gemini 3</p>
    </footer>

</body>
</html>
